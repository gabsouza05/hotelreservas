<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Hotel Reservas - Novo Quarto</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">

        <h2>🏨 Hotel Reservas</h2>

        <a href="index.html">Quartos</a>
        <a href="novo-quarto.html">Novo Quarto</a>
        <a href="reservas.html">Reservas</a>

    </nav>

    <div class="caixa-maior">

        <div class="cabecalho">

            <div>

                <h2>Cadastro de Quarto</h2>
                <p>Informe os dados do novo quarto.</p>

            </div>

        </div>

        <div class="formulario">

            <label>Número do Quarto</label>

            <input
                type="text"
                id="numero"
                placeholder="Ex: 101">

            <label>Tipo do Quarto</label>

            <select id="tipo">

                <option value="">Selecione o tipo</option>
                <option value="Standard">Standard</option>
                <option value="Luxo">Luxo</option>
                <option value="Suíte">Suíte</option>

            </select>

            <button onclick="cadastrarQuarto()">
                Cadastrar
            </button>

            <button
                class="voltar"
                onclick="window.location.href='index.html'">

                Voltar

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
